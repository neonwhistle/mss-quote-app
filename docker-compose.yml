# Run the same image as production Dockerfile (standalone Next.js on port 3000).
#
# Local / clone on disk:
#   docker compose up -d --build
#   open http://localhost:3000
#
# Coolify “Docker Compose” (files live under /data/coolify/services/... only):
#   There is no Dockerfile next to this file. In Coolify → Environment variables, set:
#     BUILD_CONTEXT=https://github.com/neonwhistle/mss-quote-app.git#main
#   (Use your fork/private URL if different; private repos need auth BuildKit can use.)
#
# Behind another reverse proxy, bind only on loopback:
#   ports: ["127.0.0.1:3000:3000"]

services:
  web:
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: Dockerfile
    # Omit `image:` so `docker compose pull` / Coolify does not try to pull from Docker Hub.
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    restart: unless-stopped
